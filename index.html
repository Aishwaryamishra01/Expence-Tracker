<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>expense tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link href="https://fonts.googleapis.com/css?family=Poppins:100,100italic,200,200italic,300,300italic,regular,italic,500,500italic,600,600italic,700,700italic,800,800italic,900,900italic" rel="stylesheet" />
</head>
<body>
    <div class="container">
        <h1>Expense traker</h1>
        <div class="balannce-container">
            <h2>Your Balance</h2>
            <h1 id="balance">$0.00</h1>

            <div class="summary">
                <div class="income">
                    <h3>Income</h3>
                    <p id="income-ammount">$0.00</p>
                </div> <!-- income di ended here-->
                <div class="expense">
                    <h3>expense</h3>
                    <p id="expense-ammount">$0.00</p>
                </div> <!--Expence div ended here -->
            </div> <!-- Summary div ended here-->
        </div>  <!--the balance container div ended here -->
        <div class="main-content">
            <div class="transaction-container">
                <h2>Transactions</h2>
                <ul id="transaction-list">
                    <!-- transactoion will be inserted here by using js -->
                </ul>
            </div><!--transaction container div ended here-->
            <div class="form-container">
                <h2>Add Transactions</h2>
                <form action="" id="transaction-form">
                    <div class="form-group">
                        <label for="description">Description</label>
                        <input type="text" id="description" placeholder="Enter Description " required >
                    </div>
                    
                    <div class="form-group">
                        <label for="description">Amount</label>
                        <input type="number" id="amount" placeholder="Enter amount..." required >
                        <small>Use negative(-) for expences</small>
                    </div>

                    <button type="submit">Add Transaction</button>
                </form>

            </div> <!--form container div ended here-->
         </div> <!-- main container div ended here -->
    </div> <!-- the container div ended here -->
</body>
</html><link href="https://fonts.googleapis.com/css?family=Poppins:100,100italic,200,200italic,300,300italic,regular,italic,500,500italic,600,600italic,700,700italic,800,800italic,900,900italic" rel="stylesheet" />
